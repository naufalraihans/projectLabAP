language = "c"
description = '''
**INTRO TO C**

Pak Dengklek bekerja di bidang administrasi kampus yang berada di Laboratorium Algoritma dan Pemrograman, beliau bertugas untuk mendata banyak mahasiswa.
Pada Kali ini, pak dengklek ditugaskan untuk menginput data ke sistem, dan menampilkannya.
<br><br>
Pak dengklek kesulitan dalam membuatnya, jadi dia meminta bantuanmu untuk membuat program yang menerima input : 
<div class="bg-[#2d2d2d] p-4 rounded-lg font-mono text-sm">
    <ul>
        <li><span class="font-mono">nama (string)</span></li>
        <li><span class="font-mono">NIM (string)</span></li>
        <li><span class="font-mono">umur (integer)</span></li>
        <li><span class="font-mono">kelas (character)</span></li>
    </ul>
</div>

dan menampilkan output : 
<div class="bg-[#2d2d2d] p-4 rounded-lg font-mono text-sm">
    <ul>
        <li><span class="font-mono">Nama : [nama]</span></li>
        <li><span class="font-mono">NIM : [NIM]</span></li>
        <li><span class="font-mono">Umur : [umur]</span></li>
        <li><span class="font-mono">Kelas : [kelas]</span></li>
    </ul>
</div>

Bantulah Pak Dengklek Untuk mengerjakan tugas nya 
<br>
<br>
### Example 1:
<p><span class="font-mono">Input:</span></p>
<div class="bg-[#2d2d2d] p-4 rounded-lg font-mono text-sm">
